# ============================================================
# Project 01: HTTPie CLI
# Config C2 (pip-cache): Code Style - pip caching enabled, separate workflows
# Checks out httpie/cli@3.2.4 externally; no modifications to the source.
# cache-dependency-path: setup.cfg because HTTPie declares deps there, not requirements.txt
# ============================================================
name: P01 HTTPie C2 Code Style

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Run label (e.g. run-01)'
        required: false
        default: 'research run'

jobs:
  code-style:
    runs-on: ubuntu-latest

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout httpie/cli at 3.2.4
        uses: actions/checkout@v4
        with:
          repository: httpie/cli
          ref: '3.2.4'

      - name: Eco-CI checkout measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: setup.cfg

      - name: Install dependencies (venv)
        run: make venv

      - name: Eco-CI dependency-installation measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run code style checks
        run: make codestyle

      - name: Eco-CI lint measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'lint'
        continue-on-error: true

      - name: Eco-CI display results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-p01-c2-code-style
          path: /tmp/eco-ci/
          retention-days: 30
