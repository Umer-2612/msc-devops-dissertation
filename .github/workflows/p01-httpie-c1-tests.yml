# ============================================================
# Project 01: HTTPie CLI
# Config C1 (baseline): Tests - no caching, no consolidation
# Checks out httpie/cli@3.2.4 externally; no modifications to the source.
# ============================================================
name: P01 HTTPie C1 Tests

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Run label (e.g. run-01)'
        required: false
        default: 'research run'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.11'
          - '3.10'
    runs-on: ubuntu-latest

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout httpie/cli at 3.2.4
        uses: actions/checkout@v4
        with:
          repository: httpie/cli
          ref: '3.2.4'

      - name: Eco-CI checkout measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Eco-CI dependency-installation measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run tests
        run: make test
        env:
          HTTPIE_TEST_WITH_PYOPENSSL: 0

      - name: Eco-CI test-execution measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'test-execution'
        continue-on-error: true

      - name: Eco-CI display results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-p01-c1-tests-py${{ matrix.python-version }}
          path: /tmp/eco-ci/
          retention-days: 30
