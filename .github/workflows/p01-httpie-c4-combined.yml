# ============================================================
# Project 01: HTTPie CLI
# Config C4 (combined): consolidated workflow + pip caching
# Checks out httpie/cli@3.2.4 externally; no modifications to the source.
#
# Compared to C3: adds cache: pip on all setup-python steps.
# (Path-based trigger filters are omitted because all runs are manual
# workflow_dispatch against a fixed external ref, so they don't apply.)
# ============================================================
name: P01 HTTPie C4 Combined

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Run label (e.g. run-01)'
        required: false
        default: 'research run'

jobs:

  lint:
    name: Code Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout httpie/cli at 3.2.4
        uses: actions/checkout@v4
        with:
          repository: httpie/cli
          ref: '3.2.4'

      - name: Eco-CI checkout measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: setup.cfg

      - name: Install dependencies for lint
        run: make venv

      - name: Eco-CI dependency-installation measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run code style checks
        run: make codestyle

      - name: Eco-CI lint measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'lint'
        continue-on-error: true

      - name: Eco-CI display results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-p01-c4-lint
          path: /tmp/eco-ci/
          retention-days: 30

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.11'
          - '3.10'

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout httpie/cli at 3.2.4
        uses: actions/checkout@v4
        with:
          repository: httpie/cli
          ref: '3.2.4'

      - name: Eco-CI checkout measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: setup.cfg

      - name: Install dependencies
        run: make install

      - name: Eco-CI dependency-installation measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run tests
        run: make test

      - name: Eco-CI test-execution measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'test-execution'
        continue-on-error: true

      - name: Eco-CI display results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-p01-c4-tests-py${{ matrix.python-version }}
          path: /tmp/eco-ci/
          retention-days: 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout httpie/cli at 3.2.4
        uses: actions/checkout@v4
        with:
          repository: httpie/cli
          ref: '3.2.4'

      - name: Eco-CI checkout measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: setup.cfg

      - name: Install dependencies
        run: make install

      - name: Eco-CI dependency-installation measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run tests with coverage
        run: make test-cover

      - name: Eco-CI coverage measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'coverage'
        continue-on-error: true

      - name: Test distribution build
        run: make test-dist

      - name: Eco-CI dist-test measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dist-test'
        continue-on-error: true

      - name: Eco-CI display results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-p01-c4-coverage
          path: /tmp/eco-ci/
          retention-days: 30
